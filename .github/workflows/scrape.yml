name: Dallas County Lead Scraper

on:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC = 02:00 CDT daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # — Checkout ————————————————————————————————————————
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # — Python ————————————————————————————————————————
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      # — Playwright ————————————————————————————————————————
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # — Scrape ————————————————————————————————————————
      - name: Run scraper
        run: |
          python scraper/fetch.py
          python scraper/fetch_tarrant.py

      # — Commit results ————————————————————————————————————————
      - name: Commit and push records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export_*.csv dashboard/records_tarrant.json data/records_tarrant.json data/ghl_tarrant_*.csv
          git diff --cached --quiet || git commit -m "chore: update leads $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  # — Deploy dashboard to GitHub Pages ————————————————————————————————————————
  deploy:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # use the freshly-committed data

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
